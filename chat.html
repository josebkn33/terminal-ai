<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpenChat — Mensajería directa</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d14;
  --surface: #13131e;
  --surface-2: #1a1a28;
  --border: #22223a;
  --text: #e4e4f0;
  --text-muted: #7a7a9a;
  --accent: #6c5ce7;
  --accent-hover: #5a4bd1;
  --green: #00d68f;
  --green-bg: rgba(0,214,143,0.12);
  --red: #ff4757;
  --radius: 12px;
  --radius-sm: 8px;
  --chat-width: 480px;
}
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.chat-container {
  width: 100%;
  max-width: var(--chat-width);
  height: 100vh;
  max-height: 780px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 25px 80px rgba(0,0,0,0.5);
  margin: 1rem;
}
@media (max-width: 520px) {
  .chat-container { max-height: 100vh; border-radius: 0; margin: 0; border: none; }
}
.header {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 0.75rem;
  flex-shrink: 0;
}
.header .avatar {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), var(--green));
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.85rem; color: #fff;
}
.header .info { flex: 1; }
.header .info h2 { font-size: 0.95rem; font-weight: 600; }
.header .info .status {
  font-size: 0.75rem; color: var(--text-muted);
  display: flex; align-items: center; gap: 0.35rem;
}
.header .info .status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; }
.header .badge {
  font-size: 0.7rem;
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 0.25rem 0.6rem;
  border-radius: 6px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.25rem;
  display: flex; flex-direction: column;
  gap: 0.5rem;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
.message {
  max-width: 85%;
  padding: 0.65rem 1rem;
  border-radius: var(--radius-sm);
  font-size: 0.88rem;
  line-height: 1.5;
  position: relative;
  animation: msgIn 0.2s ease;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.message.mine {
  align-self: flex-end;
  background: var(--accent);
  color: #fff;
  border-bottom-right-radius: 3px;
}
.message.theirs {
  align-self: flex-start;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-bottom-left-radius: 3px;
}
.message .time {
  font-size: 0.65rem;
  opacity: 0.6;
  margin-top: 0.25rem;
  text-align: right;
}
.message.mine .time { color: rgba(255,255,255,0.7); }
.message.theirs .time { color: var(--text-muted); }
.message .author {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 0.15rem;
}
.typing {
  align-self: flex-start;
  display: none;
  align-items: center;
  gap: 0.4rem;
  padding: 0.5rem 1.25rem;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.typing.show { display: flex; }
.typing .dots { display: flex; gap: 3px; }
.typing .dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: bounce 1.4s infinite ease-in-out;
}
.typing .dots span:nth-child(1) { animation-delay: 0s; }
.typing .dots span:nth-child(2) { animation-delay: 0.2s; }
.typing .dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); } 40% { transform: scale(1); } }
.input-area {
  padding: 0.75rem 1.25rem 1rem;
  border-top: 1px solid var(--border);
  display: flex; gap: 0.5rem;
  flex-shrink: 0;
}
.input-area input {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 0.7rem 1rem;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 0.88rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.input-area input::placeholder { color: var(--text-muted); }
.input-area input:focus { border-color: var(--accent); }
.input-area button {
  width: 42px; height: 42px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 1.2rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.input-area button:hover { background: var(--accent-hover); }
.input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  text-align: center;
  padding: 2rem;
}
.empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
.empty-state h3 { font-size: 1rem; color: var(--text); margin-bottom: 0.5rem; }
.empty-state p { font-size: 0.82rem; max-width: 280px; line-height: 1.6; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    <div class="avatar">OC</div>
    <div class="info">
      <h2>OpenCode Chat</h2>
      <div class="status"><span class="dot"></span> En línea</div>
    </div>
    <div class="badge">Directo</div>
  </div>

  <div id="emptyState" class="empty-state">
    <div class="icon">💬</div>
    <h3>No hay mensajes aún</h3>
    <p>Mandame un mensaje desde acá. Te respondo en la terminal.</p>
  </div>

  <div class="messages" id="messages"></div>

  <div class="typing" id="typing">
    <div class="dots"><span></span><span></span><span></span></div>
    Respondiendo...
  </div>

  <form class="input-area" id="form">
    <input type="text" id="input" placeholder="Escribí tu mensaje..." autocomplete="off" />
    <button type="submit" id="sendBtn">➤</button>
  </form>
</div>

<script>
const STORAGE_KEY = 'opencode_chat_messages';
const USER = 'vos';
const BOT = 'opencode';

const msgContainer = document.getElementById('messages');
const emptyState = document.getElementById('emptyState');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const typing = document.getElementById('typing');

function time() {
  return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveLocal(msgs) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs)); } catch {}
}

function renderMessages() {
  const msgs = loadLocal();
  msgContainer.innerHTML = '';
  if (msgs.length === 0) {
    emptyState.style.display = 'flex';
    return;
  }
  emptyState.style.display = 'none';
  msgs.forEach(m => {
    const div = document.createElement('div');
    div.className = `message ${m.sender === USER ? 'mine' : 'theirs'}`;
    if (m.sender === BOT) {
      div.innerHTML = `<div class="author">OpenCode</div>${esc(m.content)}<div class="time">${m.time}</div>`;
    } else {
      div.innerHTML = `${esc(m.content)}<div class="time">${m.time}</div>`;
    }
    msgContainer.appendChild(div);
  });
  msgContainer.scrollTo({ top: msgContainer.scrollHeight, behavior: 'smooth' });
}

function addMessage(text, sender, t) {
  const msgs = loadLocal();
  msgs.push({ content: text, sender, time: t || time(), created_at: new Date().toISOString() });
  saveLocal(msgs);
  renderMessages();
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  sendBtn.disabled = true;
  addMessage(text, USER);
  typing.classList.add('show');
  msgContainer.scrollTo({ top: msgContainer.scrollHeight, behavior: 'smooth' });
  sendBtn.disabled = false;
});

renderMessages();
</script>
</body>
</html>
