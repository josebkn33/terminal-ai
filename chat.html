<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="cache-control" content="max-age=0" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="pragma" content="no-cache" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; connect-src * wss://*.supabase.co https://*.supabase.co https://suggestqueries.google.com https://discoveryprovider.audius.co https://i.ytimg.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://suggestqueries.google.com; frame-src 'none'; img-src 'self' https://*.audius.co https://i.ytimg.com data: blob:;" />
<title>chatJOSE33 — Modern Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080a;
  --surface-1:#0c0c10;
  --surface-2:#111118;
  --surface-3:#1a1a26;
  --border:#1e1e30;
  --text:#e0e0ff;
  --text-dim:#8888bb;
  --text-muted:#555577;
  --accent:#6c5ce7;
  --accent-glow:rgba(108,92,231,0.3);
  --green:#00e676;
  --red:#ff1744;
  --orange:#ff9100;
  --blue:#40c4ff;
  --radius:12px;
  --font:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --header-h:48px;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);background:radial-gradient(ellipse at 20% 50%, #0c0c20 0%, #08080a 70%)}

canvas#matrix{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.08}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(108,92,231,0.008) 2px,rgba(108,92,231,0.008) 4px)}

#app{position:fixed;z-index:2;inset:0;display:flex;align-items:center;justify-content:center;padding:1rem}
@media(max-width:520px){#app{padding:0}}

.glass{
  background:rgba(12,12,16,0.85);
  backdrop-filter:blur(20px) saturate(1.2);
  -webkit-backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:0 0 60px rgba(108,92,231,0.06), inset 0 1px 0 rgba(255,255,255,0.03);
}

/* ===== LOGIN ===== */
#loginScreen{width:100%;max-width:400px;padding:2.5rem 2rem;text-align:center}
#loginScreen .brand{font-size:1.8rem;font-weight:800;margin-bottom:0.15rem;letter-spacing:2px;background:linear-gradient(135deg,#6c5ce7,#00e676);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#loginScreen .sub{font-size:0.65rem;color:var(--text-muted);margin-bottom:1.8rem;letter-spacing:3px;text-transform:uppercase}
.login-field{margin-bottom:0.8rem;text-align:left}
.login-field label{font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:0.35rem}
.login-field input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:0.7rem 0.9rem;font-family:var(--font);font-size:0.85rem;color:var(--text);outline:none;transition:all 0.25s}
.login-field input:focus{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
#loginScreen .btn{width:100%;padding:0.75rem;border:none;border-radius:8px;background:linear-gradient(135deg,var(--accent),#00e676);color:#000;font-family:var(--font);font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:all 0.3s;margin-top:0.3rem}
#loginScreen .btn:hover{transform:translateY(-1px);box-shadow:0 8px 25px var(--accent-glow)}
#loginScreen .btn:active{transform:translateY(0)}
#loginScreen .hint{font-size:0.6rem;color:var(--text-muted);margin-top:1rem;letter-spacing:1px}

/* AVATAR PICKER */
.avatar-picker{margin-bottom:1rem}
.avatar-picker label{font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:0.5rem}
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;max-width:260px;margin:0 auto}
.avatar-grid .av-item{width:100%;aspect-ratio:1;border-radius:10px;border:2px solid var(--border);background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all 0.2s}
.avatar-grid .av-item:hover{border-color:var(--accent);background:var(--surface-3);transform:scale(1.08)}
.avatar-grid .av-item.selected{border-color:var(--green);background:rgba(0,230,118,0.1);box-shadow:0 0 15px rgba(0,230,118,0.15)}

/* ===== CHAT UI ===== */
#chatUI{width:100%;max-width:560px;height:100dvh;max-height:860px;display:none;flex-direction:column;overflow:hidden;position:relative}

.chat-header{padding:0.65rem 0.9rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.6rem;flex-shrink:0;min-height:var(--header-h)}
.chat-header .brand-small{font-weight:700;font-size:0.6rem;letter-spacing:1.5px;text-transform:uppercase;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0}
.chat-header .room-tabs{display:flex;gap:3px;background:var(--surface-2);border-radius:8px;padding:3px;flex:1}
.chat-header .room-tab{flex:1;padding:0.35rem 0.5rem;border:none;border-radius:6px;background:transparent;color:var(--text-muted);font-family:var(--font);font-size:0.55rem;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all 0.2s;white-space:nowrap;position:relative;font-weight:500}
.chat-header .room-tab.active{background:var(--accent);color:#000;font-weight:600}
.chat-header .room-tab:hover:not(.active){color:var(--text)}
.chat-header .room-tab .badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:0.45rem;font-weight:700;padding:0.05rem 0.3rem;border-radius:8px;display:none;min-width:16px;text-align:center}
.chat-header .room-tab .badge.show{display:block}
.chat-header .header-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);font-family:var(--font);font-size:0.55rem;font-weight:500;padding:0.3rem 0.45rem;border-radius:6px;cursor:pointer;transition:all 0.2s;flex-shrink:0;letter-spacing:0.5px}
.chat-header .header-btn:hover{border-color:var(--accent);color:var(--text);background:var(--surface-3)}
.chat-header .header-btn.playing{background:rgba(0,230,118,0.1);border-color:var(--green);color:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{50%{box-shadow:0 0 12px rgba(0,230,118,0.15)}}
.chat-header .status-badge{font-size:0.5rem;color:var(--text-muted);display:flex;align-items:center;gap:0.25rem;flex-shrink:0}
.chat-header .status-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;animation:blink 1.2s infinite}

.msgs-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
.msgs{position:absolute;inset:0;overflow-y:auto;padding:0.6rem 0.8rem;display:flex;flex-direction:column;gap:0.35rem;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-track{background:transparent}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

.msg{max-width:88%;padding:0.45rem 0.7rem;border:1px solid transparent;font-size:0.75rem;line-height:1.55;animation:msgIn 0.2s ease;display:flex;gap:0.55rem;align-items:flex-start}
@keyframes msgIn{from{opacity:0;transform:translateY(6px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.mine{align-self:flex-end;background:rgba(108,92,231,0.08);border-color:rgba(108,92,231,0.18);border-radius:10px 4px 10px 10px}
.msg.other{align-self:flex-start;background:rgba(255,255,255,0.02);border-color:var(--border);border-radius:4px 10px 10px 10px}
.msg.system{align-self:center;background:transparent;border:none;font-size:0.6rem;color:var(--text-muted);max-width:100%;text-align:center;padding:0.2rem 0}
.msg .avatar{width:28px;height:28px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;background:var(--surface-3);border:1px solid var(--border);margin-top:0.05rem;transition:transform 0.2s}
.msg:hover .avatar{transform:scale(1.1)}
.msg .body{flex:1;min-width:0}
.msg .body .author{font-size:0.6rem;font-weight:600;color:var(--accent);letter-spacing:0.3px;margin-bottom:0.05rem}
.msg.mine .body .author{color:var(--green)}
.msg .body .text{word-wrap:break-word;color:var(--text)}
.msg .body .time{font-size:0.45rem;color:var(--text-muted);margin-top:0.1rem;opacity:0.5}
.msg.mine .body .time{color:var(--text-dim)}
.msg .tag-priv{display:inline-block;font-size:0.45rem;background:rgba(108,92,231,0.15);color:var(--accent);padding:0.05rem 0.3rem;border-radius:4px;margin-bottom:0.1rem;letter-spacing:0.5px}

.msgs .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;flex:1;color:var(--text-muted);min-height:200px}
.msgs .empty-state .icon{font-size:2rem;margin-bottom:0.4rem;opacity:0.15}
.msgs .empty-state p{font-size:0.6rem;max-width:200px;line-height:1.6;color:var(--text-muted)}

.typing-indicator{display:none;font-size:0.55rem;color:var(--text-dim);padding:0.15rem 0.7rem;letter-spacing:0.5px;font-style:italic}
.typing-indicator.show{display:block}

.input-area{border-top:1px solid var(--border);flex-shrink:0;background:rgba(12,12,16,0.95)}
.input-wrap{padding:0.45rem 0.7rem;display:flex;gap:0.35rem;align-items:center}
.input-wrap .icon-btn{background:none;border:none;color:var(--text-muted);font-size:1rem;cursor:pointer;padding:0.25rem;transition:all 0.2s;line-height:1;border-radius:6px}
.input-wrap .icon-btn:hover{color:var(--text);background:var(--surface-2)}
.input-wrap input{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:0.55rem 0.8rem;font-family:var(--font);font-size:0.75rem;color:var(--text);outline:none;transition:all 0.25s;min-height:38px}
.input-wrap input::placeholder{color:var(--text-muted);font-size:0.7rem}
.input-wrap input:focus{border-color:var(--accent);box-shadow:0 0 15px var(--accent-glow)}
.input-wrap .send-btn{width:36px;height:36px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--accent),#00e676);color:#000;font-size:0.85rem;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600}
.input-wrap .send-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px var(--accent-glow)}
.input-wrap .send-btn:active{transform:scale(0.95)}

/* PICKERS */
.picker{display:none;padding:0.4rem 0.7rem;border-top:1px solid var(--border);background:var(--surface-1);flex-wrap:wrap;gap:0.25rem;max-height:120px;overflow-y:auto}
.picker.show{display:flex}
.picker button{background:var(--surface-3);border:1px solid var(--border);border-radius:6px;font-size:1rem;cursor:pointer;padding:0.2rem;transition:all 0.15s;line-height:1;min-width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.picker button:hover{border-color:var(--accent);background:var(--surface-2);transform:scale(1.1);z-index:1}
.picker button .sl{font-size:0.55rem;color:var(--text);font-weight:600}
.sticker-picker button{font-size:1.3rem;width:40px;height:40px}

.msg .sticker-content{font-size:2.5rem;line-height:1;text-align:center;padding:0.15rem 0}
.msg .sticker-label{font-size:0.5rem;color:var(--text-muted);text-align:center;letter-spacing:1px}
.msg .youtube-embed{margin-top:0.3rem;border-radius:8px;overflow:hidden;}
.msg .youtube-embed iframe{width:100%;max-width:280px;height:158px;border:0;display:block}

/* MUSIC */
.music-panel{display:none;padding:0.7rem;border-top:1px solid var(--border);background:rgba(12,12,16,0.98);flex-direction:column;gap:0.5rem}
.music-panel.show{display:flex}
.music-panel .music-input-wrap{display:flex;gap:0.35rem}
.music-panel input{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:0.45rem 0.7rem;font-family:var(--font);font-size:0.7rem;color:var(--text);outline:none}
.music-panel input:focus{border-color:var(--accent)}
.music-panel .music-play-btn{background:linear-gradient(135deg,var(--accent),var(--green));color:#000;border:none;border-radius:8px;padding:0.45rem 0.8rem;font-family:var(--font);font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;white-space:nowrap}
.music-results{max-height:140px;overflow-y:auto;display:none;flex-direction:column;gap:0.15rem}
.music-results.show{display:flex}
.music-results .mr-item{display:flex;align-items:center;gap:0.4rem;padding:0.3rem;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all 0.15s;font-size:0.65rem}
.music-results .mr-item:hover{border-color:var(--accent);background:var(--surface-2)}
.music-results .mr-item .mr-title{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.music-results .mr-item .mr-dur{color:var(--text-muted);font-size:0.5rem;flex-shrink:0}
.music-hint{font-size:0.5rem;color:var(--text-muted)}
.music-info{font-size:0.55rem;color:var(--text-dim);display:flex;align-items:center;gap:0.3rem}
.music-info .song-title{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* FLOATING PLAYER */
.floating-player{position:fixed;bottom:80px;right:24px;width:320px;z-index:50;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,0.6);display:none;background:var(--surface-1)}
.floating-player.show{display:block}
.floating-player .fp-bar{padding:0.45rem 0.7rem;display:flex;align-items:center;gap:0.4rem;font-size:0.55rem;border-bottom:1px solid var(--border)}
.floating-player .fp-bar .fp-title{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:0.3px}
.floating-player .fp-bar .fp-close{background:none;border:none;color:var(--text-muted);font-size:0.75rem;cursor:pointer;padding:0.1rem}
.floating-player .fp-bar .fp-close:hover{color:var(--text)}
.floating-player audio{width:100%;height:40px;display:block}

/* ADMIN PANEL */
#adminPanel{display:none;position:absolute;top:0;right:0;width:280px;height:100%;background:rgba(12,12,16,0.98);border-left:1px solid var(--border);z-index:10;flex-direction:column;backdrop-filter:blur(20px)}
#adminPanel.show{display:flex}
#adminPanel .panel-header{padding:0.6rem 0.8rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
#adminPanel .panel-header h3{font-size:0.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);font-weight:600}
#adminPanel .panel-header .close-btn{background:none;border:none;color:var(--text-muted);font-size:0.8rem;cursor:pointer}
#adminPanel .panel-body{flex:1;overflow-y:auto;padding:0.5rem 0.8rem;font-size:0.6rem}
#adminPanel .panel-body .user-item{display:flex;align-items:center;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border)}
#adminPanel .panel-body .user-item .u-name{display:flex;align-items:center;gap:0.4rem}
#adminPanel .panel-body .ban-btn{background:none;border:1px solid var(--red);color:var(--red);font-family:var(--font);font-size:0.5rem;padding:0.15rem 0.4rem;border-radius:4px;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px}
#adminPanel .panel-body .ban-btn:hover{background:var(--red);color:#000}
#adminPanel .panel-body .ban-list-title{font-size:0.5rem;color:var(--text-muted);margin-top:0.8rem;margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:1px}
#adminPanel .panel-body .ban-item{display:flex;align-items:center;justify-content:space-between;padding:0.2rem 0;color:var(--red)}
#adminPanel .panel-body .unban-btn{background:none;border:1px solid var(--text-muted);color:var(--text-muted);font-family:var(--font);font-size:0.45rem;padding:0.1rem 0.3rem;border-radius:4px;cursor:pointer}

#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9}
#overlay.show{display:block}

.banned-overlay{display:none;position:absolute;inset:0;z-index:20;background:rgba(10,10,14,0.97);align-items:center;justify-content:center;text-align:center;flex-direction:column;gap:0.5rem;padding:2rem}
.banned-overlay.show{display:flex}
.banned-overlay .icon{font-size:2.5rem}
.banned-overlay h2{font-size:0.9rem;color:var(--red);letter-spacing:2px}
.banned-overlay p{font-size:0.65rem;color:var(--text-muted);max-width:250px;line-height:1.5}

@keyframes blink{50%{opacity:0.2}}

@media(max-width:520px){
  .chat-header .room-tab{font-size:0.5rem;padding:0.25rem 0.3rem}
  .chat-header .brand-small{font-size:0.5rem}
  .chat-header .header-btn{font-size:0.5rem;padding:0.2rem 0.3rem}
  #adminPanel{width:100%}
  .floating-player{right:10px;left:10px;width:auto;bottom:70px}
  .avatar-grid{grid-template-columns:repeat(5,1fr);max-width:220px}
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div class="scanlines"></div>
<div id="overlay"></div>

<div id="app">

<div id="loginScreen" class="glass">
  <div class="brand">chatJOSE33</div>
  <div class="sub" id="loginSub">Terminal Hacker Chat</div>
  <div class="avatar-picker">
    <label>Elegí tu avatar</label>
    <div class="avatar-grid" id="avatarGrid"></div>
  </div>
  <div class="login-field">
    <label>Nickname</label>
    <input type="text" id="nickInput" placeholder="tu_nick..." maxlength="16" autocomplete="off" />
  </div>
  <div class="login-field" id="adminPassField" style="display:none;">
    <label>🔑 Clave de admin</label>
    <input type="password" id="adminPass" placeholder="clave..." />
  </div>
  <button class="btn" id="enterBtn">▸ ENTER</button>
  <div class="hint">CANAL GLOBAL</div>
  <div class="hint" id="adminHint" style="display:none;">CANALES: GLOBAL + PRIVADO JOSE</div>
</div>

<div id="chatUI" class="glass">
  <div class="chat-header">
    <div class="brand-small">CHATJOSE33</div>
    <div class="room-tabs">
      <button class="room-tab active" data-room="global">🌐 Global <span class="badge" id="globalBadge"></span></button>
      <button class="room-tab" data-room="jose" id="joseTab">🔒 Jose <span class="badge" id="joseBadge"></span></button>
    </div>
    <button class="header-btn" id="musicBtn">🎵</button>
    <button class="header-btn" id="adminBtn">⚙️</button>
    <div class="status-badge"><span class="dot"></span><span id="statusText">WAIT</span></div>
  </div>

  <div class="music-panel" id="musicPanel">
    <div class="music-input-wrap">
      <input type="text" id="musicInput" placeholder="buscá una canción..." />
      <button class="music-play-btn" id="musicPlayBtn">🔍 BUSCAR</button>
    </div>
    <div class="music-results" id="musicResults"></div>
    <div class="music-hint">Sugerencias al escribir</div>
    <div class="music-info">🎵 <span class="song-title" id="musicNow">Sin reproducción</span></div>
  </div>

  <div class="floating-player" id="floatingPlayer">
    <div class="fp-bar">
      <span class="fp-title" id="fpTitle">Sin música</span>
      <button class="fp-close" id="fpClose">✕</button>
    </div>
    <audio id="fpAudio" controls></audio>
  </div>

  <div class="msgs-wrap">
    <div class="msgs" id="msgContainer"></div>
    <div id="adminPanel">
      <div class="panel-header"><h3>⚙️ Admin</h3><button class="close-btn" id="closeAdmin">✕</button></div>
      <div class="panel-body" id="adminBody"><div style="padding:1rem 0;text-align:center;color:var(--text-muted);font-size:0.55rem;">Usuarios conectados aparecerán aquí.</div></div>
    </div>
    <div class="banned-overlay" id="bannedOverlay">
      <div class="icon">🚫</div><h2>BANEADO</h2>
      <p>Has sido bloqueado por un administrador.</p>
      <div class="reason" id="banReason" style="color:var(--text-dim);font-size:0.55rem;margin-top:0.3rem;"></div>
    </div>
  </div>

  <div class="input-area">
    <div class="typing-indicator" id="typingIndicator">✎ <span id="typingName"></span> está escribiendo...</div>
    <div class="picker emoji-picker" id="emojiPicker">
      <button>😀</button><button>😂</button><button>🤣</button><button>😅</button><button>😊</button><button>😎</button><button>🤩</button><button>😍</button><button>🥰</button><button>😜</button><button>🤪</button><button>😈</button>

<script>
const canvas=document.getElementById('matrix'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});
const cols=Math.floor(canvas.width/14),drops=Array(cols).fill(1);
const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>/{}[]|~!@#$%^&*()_+-=';
function drawMatrix(){
  ctx.fillStyle='rgba(8,8,10,0.04)';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<drops.length;i++){
    const c=chars[Math.floor(Math.random()*chars.length)];
    ctx.fillStyle=Math.random()>0.97?'rgba(108,92,231,0.6)':'rgba(108,92,231,0.15)';
    ctx.font='12px monospace';ctx.fillText(c,i*14,drops[i]*14);
    if(drops[i]*14>canvas.height&&Math.random()>0.975)drops[i]=0;
    drops[i]++;
  }
}
setInterval(drawMatrix,50);

const l=id=>document.getElementById(id);
const loginScreen=l('loginScreen'),chatUI=l('chatUI');

// ===== SUPABASE =====
const ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBreGNmYW9rb2hpdmNyamVhemluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNTAxODEsImV4cCI6MjA5ODYyNjE4MX0.aZJ-aeZeaikMig24E2ax-L48EHwM-LJwonf5bkooIH8';
const SB='https://pkxcfaokohivcrjeazin.supabase.co';
const WS_URL=SB.replace('https://','wss://')+'/realtime/v1/websocket?apikey='+ANON_KEY+'&vsn=1.0.0';
const CH_G='realtime:chat-jose33-global',CH_J='realtime:chat-jose33-dm2';
const SK_G='chat_jose33_global',SK_J='chat_jose33_jose';

let ws,myNick='',currentRoom='global',connected=false,isAdmin=false;

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function time(){return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}
async function sha256(s){const e=new TextEncoder();const d=await crypto.subtle.digest('SHA-256',e.encode(s));return Array.from(new Uint8Array(d)).map(b=>b.toString(16).padStart(2,'0')).join('')}
const ADMIN_HASH='106f79496f3904835b3ac6e408b1ca8bf0ecc01bd89726c0e4d4b869b78b4b20';

function renderMsgs(){
  const msgs=currentRoom==='global'?gMsgs:jMsgs;
  msgContainer.innerHTML='';
  if(msgs.length===0){
    const e=document.createElement('div');e.className='empty-state';
    e.innerHTML='<div class="icon">💬</div><p>'+(currentRoom==='global'?'Sala Global':'🔒 Canal Jose')+'</p>';
    msgContainer.appendChild(e);return;
  }
  msgs.forEach(m=>{
    if(m.system){
      const d=document.createElement('div');d.className='msg system';d.textContent=m.text;msgContainer.appendChild(d);return;
    }
    const d=document.createElement('div');d.className='msg '+(m.user===myNick?'mine':'other');
    const av=document.createElement('div');av.className='avatar';av.textContent=m.avatar||'😎';d.appendChild(av);
    const b=document.createElement('div');b.className='body';
    if(m.priv){const t=document.createElement('div');t.className='tag-priv';t.textContent='🔒 PRIVADO';b.appendChild(t)}
    const a=document.createElement('div');a.className='author';a.textContent='>'+esc(m.user)+(m.user===myNick?' (vos)':'');b.appendChild(a);
    const txt=document.createElement('div');txt.className='text';
    if(m.sticker){txt.className='sticker-content';txt.textContent=m.sticker;b.appendChild(txt);
      const l=document.createElement('div');l.className='sticker-label';l.textContent='/'+m.sticker;b.appendChild(l)
    }else{txt.textContent=m.text;b.appendChild(txt)}
    const t=document.createElement('div');t.className='time';t.textContent=m.time;b.appendChild(t);
    d.appendChild(b);msgContainer.appendChild(d);
  });
  msgContainer.scrollTo({top:msgContainer.scrollHeight,behavior:'smooth'});
}

function saveMsgs(){try{localStorage.setItem(SK_G,JSON.stringify(gMsgs.slice(-200)));localStorage.setItem(SK_J,JSON.stringify(jMsgs.slice(-200)))}catch{}}
function loadMsgs(){try{const g=localStorage.getItem(SK_G);if(g)gMsgs=JSON.parse(g);const j=localStorage.getItem(SK_J);if(j)jMsgs=JSON.parse(j)}catch{}}

function handleMsg(p){
  if(p.type==='message'){
    const isPriv=p._topic===CH_J;
    const msg={user:p.user,text:p.text,time:p.time||time(),priv:isPriv,avatar:p.avatar||'😎'};
    if(isPriv){jMsgs.push(msg);if(currentRoom!=='jose'){jUnread++;joseBadge.textContent=jUnread;joseBadge.classList.add('show')}}
    else{gMsgs.push(msg);if(currentRoom!=='global'){gUnread++;globalBadge.textContent=gUnread;globalBadge.classList.add('show')}}
    if((isPriv&&currentRoom==='jose')||(!isPriv&&currentRoom==='global'))renderMsgs();
    saveMsgs();
  }else if(p.type==='join'&&p.user!==myNick){
    gMsgs.push({user:'',text:'▸ '+p.user+' se conectó',time:time(),system:true});connUsers[p.user]=true;
    if(currentRoom==='global')renderMsgs();saveMsgs();updateAdmin();
  }else if(p.type==='leave'&&p.user!==myNick){
    gMsgs.push({user:'',text:'▸ '+p.user+' se desconectó',time:time(),system:true});delete connUsers[p.user];
    if(currentRoom==='global')renderMsgs();saveMsgs();updateAdmin();
  }else if(p.type==='ban'){if(p.target===myNick)showBanned(p.reason||'');if(isAdmin){bannedNicks[p.target]=p.reason||'';updateAdmin()}
  }else if(p.type==='unban'){if(isAdmin){delete bannedNicks[p.target];updateAdmin()}
  }else if(p.type==='typing'&&p.user!==myNick){typingName.textContent=p.user;typingIndicator.classList.add('show');clearTimeout(typingTimer);typingTimer=setTimeout(()=>typingIndicator.classList.remove('show'),2000)
  }else if(p.type==='userlist_sync'&&Array.isArray(p.users)){p.users.forEach(u=>{connUsers[u]=true});updateAdmin()}
}

function showBanned(r){banReason.textContent=r?'Razón: '+r:'';bannedOverlay.classList.add('show')}

function connect(){
  if(ws)try{ws.close()}catch{}
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{
    connected=true;statusText.textContent='LIVE';
    ws.send(JSON.stringify({topic:CH_G,event:'phx_join',payload:{config:{broadcast:{ack:false,self:true}}},ref:'1'}));
    ws.send(JSON.stringify({topic:CH_J,event:'phx_join',payload:{config:{broadcast:{ack:false,self:true}}},ref:'2'}));
    ws.send(JSON.stringify({topic:CH_G,event:'broadcast',payload:{event:'message',payload:{type:'join',user:myNick,avatar:selectedAvatar}},ref:'3'}));
    setTimeout(()=>broadcast(CH_G,'userlist_sync',{users:Object.keys(connUsers)}),500);
  };
  ws.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);
      if(d.event==='broadcast'&&d.payload?.payload){
        const p=d.payload.payload;
        if(typeof p!=='object'||!p.type)return;
        if(p.type==='message'&&(typeof p.text!=='string'||p.text.length>500||typeof p.user!=='string'))return;
        p._topic=d.topic;handleMsg(p);
      }
    }catch{}
  };
  ws.onclose=()=>{connected=false;statusText.textContent='OFF';setTimeout(()=>connect(),3000)};
  ws.onerror=()=>{};
}

function broadcast(topic,type,extra){
  if(!ws||!connected)return;
  const p=Object.assign({type,user:myNick,avatar:selectedAvatar,time:time()},extra);
  ws.send(JSON.stringify({topic,event:'broadcast',payload:{event:'message',payload:p},ref:Date.now().toString()}));
}

function sendMsg(text,priv){
  if(!ws||!connected)return;
  const ch=priv?CH_J:CH_G;
  broadcast(ch,'message',{text,priv});
  const msg={user:myNick,text,time:time(),priv,avatar:selectedAvatar};
  if(priv){jMsgs.push(msg);if(currentRoom==='jose')renderMsgs()}else{gMsgs.push(msg);if(currentRoom==='global')renderMsgs()}
  saveMsgs();
}

function fetchSuggestions(q){
  const cb='ytS'+Date.now();
  window[cb]=function(d){
    const sug=(d&&d[1])||[];if(!sug.length)return;
    musicResults.innerHTML='';
    sug.slice(0,8).forEach(s=>{
      const t=typeof s==='string'?s:s[0];
      const i=document.createElement('div');i.className='mr-item';
      i.innerHTML='<span style="color:var(--accent)">🎵</span><span class="mr-title">'+esc(t)+'</span>';
      i.addEventListener('click',()=>{musicInput.value=t;searchAudius(t)});
      musicResults.appendChild(i);
    });musicResults.classList.add('show');
    try{document.head.removeChild(document.getElementById(cb))}catch{}delete window[cb]
  };
  const s=document.createElement('script');s.id=cb;
  s.src='https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q='+encodeURIComponent(q)+'&callback='+cb;
  document.head.appendChild(s);
}

function handleMusic(){
  const v=musicInput.value.trim();if(!v)return;
  const yt=v.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(yt){fpTitle.textContent='▶ YouTube';musicNow.textContent='YouTube';floatingPlayer.classList.add('show');musicBtn.classList.add('playing');musicPanel.classList.remove('show');return}
  searchAudius(v);
}

function searchAudius(q){
  if(!q||q.length<2)return;
  musicResults.classList.remove('show');
  fetch('https://discoveryprovider.audius.co/v1/tracks/search?query='+encodeURIComponent(q)+'&limit=8')
    .then(r=>r.json()).then(d=>{
      const tracks=d.data||[];if(!tracks.length)throw Error();
      musicResults.innerHTML='';
      tracks.forEach(t=>{
        const i=document.createElement('div');i.className='mr-item';
        const dur=t.duration?Math.floor(t.duration/60)+':'+String(t.duration%60).padStart(2,'0'):'';
        i.innerHTML='<span style="color:var(--accent)">▶️</span><span class="mr-title">'+esc(t.title||'')+' — '+esc(t.user?.name||'')+'</span><span class="mr-dur">'+dur+'</span>';
        i.addEventListener('click',()=>playAudius(t));musicResults.appendChild(i);
      });musicResults.classList.add('show');
    }).catch(()=>{
      musicResults.innerHTML='<div style="color:var(--red);padding:0.3rem;">Sin resultados. Probá con un link de YouTube.</div>';musicResults.classList.add('show');
    });
}

function playAudius(t){
  fpTitle.textContent=t.title||'';musicNow.textContent=t.title||'';
  fpAudio.src='https://discoveryprovider.audius.co/v1/tracks/'+t.id+'/stream';fpAudio.play();
  floatingPlayer.classList.add('show');musicBtn.classList.add('playing');musicPanel.classList.remove('show');
  broadcast(currentRoom==='jose'?CH_J:CH_G,'message',{text:'🎵 '+t.title+' – '+(t.user?.name||'')});
  const msg={user:myNick,text:'🎵 '+t.title,time:time(),priv:currentRoom==='jose',avatar:selectedAvatar};
  if(currentRoom==='jose'){jMsgs.push(msg);if(currentRoom==='jose')renderMsgs()}else{gMsgs.push(msg);if(currentRoom==='global')renderMsgs()}
  saveMsgs();
}
