<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="cache-control" content="max-age=0" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="pragma" content="no-cache" />
<title>chatJOSE33 — Terminal Hacker Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a;
  --surface: #0d0d0d;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --border: #1f1f1f;
  --text: #00ff41;
  --text-dim: #008f28;
  --text-muted: #005a18;
  --accent: #00ff41;
  --red: #ff0044;
  --yellow: #ffdd00;
  --radius: 4px;
  --font: 'JetBrains Mono', monospace;
  --header-h: 44px;
  --input-h: 50px;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: var(--text); }
canvas#matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.2; }
.scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.015) 2px,rgba(0,255,65,0.015) 4px); }

#app { position: fixed; z-index: 2; inset: 0; display: flex; align-items: center; justify-content: center; padding: 0.75rem; }
@media (max-width: 520px) { #app { padding: 0; } }

.glass { background: rgba(0,0,0,0.88); border: 1px solid var(--text-dim); box-shadow: 0 0 30px rgba(0,255,65,0.08), inset 0 0 30px rgba(0,255,65,0.02); backdrop-filter: blur(4px); }

#loginScreen { width: 100%; max-width: 380px; border-radius: var(--radius); padding: 2.5rem 2rem; text-align: center; }
#loginScreen .brand { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.25rem; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 20px rgba(0,255,65,0.5); }
#loginScreen .brand span { color: var(--text-dim); }
#loginScreen .sub { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 1.5rem; letter-spacing: 2px; }
#loginScreen .field { margin-bottom: 0.75rem; text-align: left; }
#loginScreen .field label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 0.3rem; }
#loginScreen .field input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.7rem 0.9rem; font-family: var(--font); font-size: 0.85rem; color: var(--text); outline: none; transition: all 0.2s; }
#loginScreen .field input:focus { border-color: var(--text); box-shadow: 0 0 15px rgba(0,255,65,0.15); }
#loginScreen .btn { width: 100%; padding: 0.7rem; border: 1px solid var(--text); border-radius: var(--radius); background: transparent; color: var(--text); font-family: var(--font); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: all 0.3s; margin-top: 0.5rem; }
#loginScreen .btn:hover { background: var(--text); color: #000; box-shadow: 0 0 30px rgba(0,255,65,0.3); }
#loginScreen .hint { font-size: 0.65rem; color: var(--text-muted); margin-top: 1rem; letter-spacing: 1px; }

/* CHAT UI */
#chatUI { width: 100%; max-width: 520px; height: 100dvh; max-height: 840px; border-radius: var(--radius); display: none; flex-direction: column; overflow: hidden; position: relative; }
@media (max-width: 520px) { #chatUI { border-radius: 0; border: none; max-height: 100dvh; } }

.chat-header { padding: 0.5rem 0.7rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; min-height: var(--header-h); }
.chat-header .brand-small { font-weight: 600; font-size: 0.55rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); flex-shrink: 0; }
.chat-header .room-tabs { display: flex; gap: 2px; background: var(--surface-2); border-radius: var(--radius); padding: 2px; flex: 1; }
.chat-header .room-tab { flex: 1; padding: 0.3rem 0.4rem; border: none; border-radius: 3px; background: transparent; color: var(--text-muted); font-family: var(--font); font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; white-space: nowrap; position: relative; }
.chat-header .room-tab.active { background: var(--text); color: #000; font-weight: 600; }
.chat-header .room-tab:hover:not(.active) { color: var(--text); }
.chat-header .room-tab .badge { position: absolute; top: -4px; right: -4px; background: var(--red); color: #000; font-size: 0.5rem; font-weight: 700; padding: 0.05rem 0.25rem; border-radius: 10px; display: none; min-width: 14px; text-align: center; }
.chat-header .room-tab .badge.show { display: block; }
.chat-header .admin-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); font-family: var(--font); font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; padding: 0.25rem 0.4rem; border-radius: var(--radius); cursor: pointer; transition: all 0.2s; flex-shrink: 0; display: none; }
.chat-header .admin-btn:hover { border-color: var(--red); color: var(--red); background: rgba(255,0,68,0.05); }
.chat-header .admin-btn.show { display: block; }
.chat-header .status-badge { font-size: 0.5rem; color: var(--text-dim); letter-spacing: 1px; display: flex; align-items: center; gap: 0.25rem; flex-shrink: 0; }
.chat-header .status-badge .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text); display: inline-block; animation: blink 1s infinite; }

/* MSGS AREA — usar visualViewport en mobile */
.msgs-wrap { flex: 1; position: relative; overflow: hidden; min-height: 0; }
.msgs { position: absolute; inset: 0; overflow-y: auto; padding: 0.5rem 0.7rem; display: flex; flex-direction: column; gap: 0.25rem; scroll-behavior: smooth; }
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-track { background: transparent; }
.msgs::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 10px; }

.msg { max-width: 92%; padding: 0.35rem 0.6rem; border: 1px solid transparent; font-size: 0.7rem; line-height: 1.5; animation: fadeIn 0.15s ease; position: relative; display: flex; gap: 0.5rem; align-items: flex-start; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
.msg.mine { align-self: flex-end; background: rgba(0,255,65,0.06); border-color: rgba(0,255,65,0.15); border-radius: 3px 0 3px 3px; }
.msg.other { align-self: flex-start; background: rgba(255,255,255,0.02); border-color: var(--border); border-radius: 0 3px 3px 3px; }
.msg.system { align-self: center; background: transparent; border: none; font-size: 0.55rem; color: var(--text-muted); max-width: 100%; text-align: center; padding: 0.15rem 0; }
.msg .avatar { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 700; letter-spacing: 0.5px; border: 1px solid rgba(0,255,65,0.2); margin-top: 0.1rem; }
.msg .body { flex: 1; min-width: 0; }
.msg .body .author { font-size: 0.55rem; font-weight: 600; color: var(--accent); letter-spacing: 0.5px; }
.msg.mine .body .author { color: var(--text-dim); }
.msg .body .text { word-wrap: break-word; }
.msg .body .time { font-size: 0.45rem; color: var(--text-muted); margin-top: 0.05rem; opacity: 0.6; }
.msg.mine .body .time { color: var(--text-dim); }
.msg .tag-priv { display: inline-block; font-size: 0.45rem; background: rgba(255,0,68,0.15); color: var(--red); padding: 0.05rem 0.25rem; border-radius: 2px; margin-bottom: 0.05rem; letter-spacing: 0.5px; }
.msg .tag-ban { display: inline-block; font-size: 0.45rem; background: rgba(255,0,68,0.2); color: var(--red); padding: 0.05rem 0.25rem; border-radius: 2px; margin-bottom: 0.05rem; letter-spacing: 0.5px; }

.msgs .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; flex: 1; color: var(--text-muted); min-height: 200px; }
.msgs .empty-state .icon { font-size: 1.5rem; margin-bottom: 0.4rem; opacity: 0.3; }
.msgs .empty-state p { font-size: 0.6rem; max-width: 180px; line-height: 1.5; }

.typing-indicator { display: none; font-size: 0.55rem; color: var(--text-dim); padding: 0.15rem 0; letter-spacing: 0.5px; }
.typing-indicator.show { display: block; }

/* INPUT AREA — fixed at bottom on mobile */
.input-area { border-top: 1px solid var(--border); flex-shrink: 0; background: rgba(0,0,0,0.95); }
.input-wrap { padding: 0.4rem 0.7rem; display: flex; gap: 0.35rem; align-items: flex-end; }
.input-wrap .emoji-btn { background: none; border: none; color: var(--text-muted); font-size: 0.9rem; cursor: pointer; padding: 0.25rem; transition: color 0.2s; line-height: 1; }
.input-wrap .emoji-btn:hover { color: var(--text); }
.input-wrap input { flex: 1; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem 0.7rem; font-family: var(--font); font-size: 0.7rem; color: var(--text); outline: none; transition: border-color 0.2s; min-height: 34px; }
.input-wrap input::placeholder { color: var(--text-muted); font-size: 0.65rem; }
.input-wrap input:focus { border-color: var(--text-dim); }
.input-wrap .send-btn { width: 34px; height: 34px; border-radius: var(--radius); border: 1px solid var(--text-dim); background: transparent; color: var(--text); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.input-wrap .send-btn:hover { background: var(--text); color: #000; }

.emoji-picker { display: none; padding: 0.35rem 0.7rem; border-top: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; gap: 0.2rem; max-height: 100px; overflow-y: auto; }
.emoji-picker.show { display: flex; }
.emoji-picker button { background: none; border: none; font-size: 1rem; cursor: pointer; padding: 0.15rem; border-radius: 3px; transition: background 0.15s; line-height: 1; }
.emoji-picker button:hover { background: var(--surface-3); }

/* STICKERS */
.sticker-btn { background: none; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; padding: 0.25rem; transition: color 0.2s; line-height: 1; }
.sticker-btn:hover { color: var(--text); }
.sticker-picker { display: none; padding: 0.35rem 0.7rem; border-top: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; gap: 0.3rem; max-height: 140px; overflow-y: auto; }
.sticker-picker.show { display: flex; }
.sticker-picker button { background: var(--surface-3); border: 1px solid var(--border); border-radius: var(--radius); font-size: 1.5rem; cursor: pointer; padding: 0.3rem; transition: all 0.15s; line-height: 1; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
.sticker-picker button:hover { border-color: var(--text-dim); background: var(--surface-2); transform: scale(1.1); }
.sticker-picker button .sl { font-size: 0.55rem; color: var(--text); letter-spacing: 0.5px; }

.msg .sticker-content { font-size: 3rem; line-height: 1; text-align: center; padding: 0.2rem 0; }
.msg .sticker-label { font-size: 0.55rem; color: var(--text-muted); text-align: center; letter-spacing: 1px; }
.msg.other .sticker-content { font-size: 3rem; }
.msg.mine .sticker-content { font-size: 3rem; }
.msg .youtube-embed { margin-top: 0.3rem; border-radius: var(--radius); overflow: hidden; }
.msg .youtube-embed iframe { width: 100%; max-width: 280px; height: 158px; border: 0; display: block; }
.msg .youtube-link { display: inline-block; margin-top: 0.2rem; font-size: 0.6rem; color: var(--text-dim); text-decoration: underline; word-break: break-all; }

/* FLOATING MUSIC PLAYER */
.music-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); font-family: var(--font); font-size: 0.55rem; letter-spacing: 1px; padding: 0.25rem 0.4rem; border-radius: var(--radius); cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
.music-btn:hover { border-color: var(--text-dim); color: var(--text); }
.music-btn.playing { border-color: var(--text); color: var(--text); animation: pulse 1.5s infinite; }
@keyframes pulse { 50% { box-shadow: 0 0 8px rgba(0,255,65,0.3); } }
#musicPanel { display: none; position: absolute; bottom: var(--input-h); left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 0.7rem; z-index: 8; flex-direction: column; gap: 0.5rem; }
#musicPanel.show { display: flex; }
#musicPanel .music-input-wrap { display: flex; gap: 0.35rem; }
#musicPanel input { flex: 1; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.4rem 0.6rem; font-family: var(--font); font-size: 0.65rem; color: var(--text); outline: none; }
#musicPanel input:focus { border-color: var(--text-dim); }
#musicPanel .music-play-btn { background: var(--text); color: #000; border: none; border-radius: var(--radius); padding: 0.4rem 0.8rem; font-family: var(--font); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; font-weight: 600; white-space: nowrap; }
#musicPanel .music-play-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#musicPanel .music-info { font-size: 0.55rem; color: var(--text-dim); letter-spacing: 0.5px; display: flex; align-items: center; gap: 0.3rem; }
#musicPanel .music-info .song-title { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#musicPanel .music-close { position: absolute; top: 0.3rem; right: 0.5rem; background: none; border: none; color: var(--text-muted); font-size: 0.8rem; cursor: pointer; }
#musicPanel .music-results { max-height: 120px; overflow-y: auto; display: none; flex-direction: column; gap: 0.2rem; }
#musicPanel .music-results.show { display: flex; }
#musicPanel .music-results .mr-item { display: flex; align-items: center; gap: 0.4rem; padding: 0.3rem; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.15s; font-size: 0.6rem; }
#musicPanel .music-results .mr-item:hover { border-color: var(--text-dim); background: var(--surface-2); }
#musicPanel .music-results .mr-item .mr-thumb { width: 32px; height: 24px; border-radius: 2px; flex-shrink: 0; object-fit: cover; background: var(--surface-3); }
#musicPanel .music-results .mr-item .mr-title { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#musicPanel .music-results .mr-item .mr-dur { color: var(--text-muted); font-size: 0.5rem; }
#musicPanel .music-loading { font-size: 0.55rem; color: var(--text-muted); display: none; }
#musicPanel .music-loading.show { display: block; }

.floating-player { position: fixed; bottom: 70px; right: 20px; width: 340px; z-index: 50; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); box-shadow: 0 0 30px rgba(0,0,0,0.8); display: none; }
.floating-player.show { display: block; }
.floating-player iframe { width: 100%; height: 180px; border: 0; display: block; }
.floating-player .fp-bar { background: rgba(0,0,0,0.95); padding: 0.35rem 0.6rem; display: flex; align-items: center; gap: 0.4rem; font-size: 0.55rem; }
.floating-player .fp-bar .fp-title { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 0.5px; }
.floating-player .fp-bar .fp-close { background: none; border: none; color: var(--text-muted); font-size: 0.7rem; cursor: pointer; padding: 0.1rem; }

/* ADMIN PANEL */
#adminPanel { display: none; position: absolute; top: 0; right: 0; width: 280px; height: 100%; background: rgba(0,0,0,0.95); border-left: 1px solid var(--border); z-index: 10; flex-direction: column; }
#adminPanel.show { display: flex; }
#adminPanel .panel-header { padding: 0.5rem 0.7rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
#adminPanel .panel-header h3 { font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
#adminPanel .panel-header .close-btn { background: none; border: none; color: var(--text-muted); font-size: 0.8rem; cursor: pointer; }
#adminPanel .panel-body { flex: 1; overflow-y: auto; padding: 0.5rem 0.7rem; }
#adminPanel .panel-body .user-item { display: flex; align-items: center; justify-content: space-between; padding: 0.35rem 0; border-bottom: 1px solid var(--border); font-size: 0.6rem; }
#adminPanel .panel-body .user-item .u-name { display: flex; align-items: center; gap: 0.4rem; }
#adminPanel .panel-body .user-item .u-name .avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.45rem; font-weight: 700; }
#adminPanel .panel-body .user-item .u-name .tag { font-size: 0.45rem; color: var(--text-muted); }
#adminPanel .panel-body .user-item .ban-btn { background: none; border: 1px solid var(--red); color: var(--red); font-family: var(--font); font-size: 0.5rem; padding: 0.15rem 0.4rem; border-radius: 2px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
#adminPanel .panel-body .user-item .ban-btn:hover { background: var(--red); color: #000; }
#adminPanel .panel-body .ban-list-title { font-size: 0.55rem; color: var(--text-muted); letter-spacing: 1px; margin-top: 1rem; margin-bottom: 0.3rem; text-transform: uppercase; }
#adminPanel .panel-body .ban-item { display: flex; align-items: center; justify-content: space-between; padding: 0.2rem 0; font-size: 0.55rem; color: var(--red); }
#adminPanel .panel-body .ban-item .unban-btn { background: none; border: 1px solid var(--text-muted); color: var(--text-muted); font-family: var(--font); font-size: 0.45rem; padding: 0.1rem 0.3rem; border-radius: 2px; cursor: pointer; }

/* dark overlay */
#overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9; }
#overlay.show { display: block; }

/* BANNED overlay */
.banned-overlay { display: none; position: absolute; inset: 0; z-index: 20; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; text-align: center; flex-direction: column; gap: 0.5rem; padding: 2rem; }
.banned-overlay.show { display: flex; }
.banned-overlay .icon { font-size: 2rem; }
.banned-overlay h2 { font-size: 0.9rem; color: var(--red); letter-spacing: 2px; }
.banned-overlay p { font-size: 0.65rem; color: var(--text-muted); max-width: 250px; line-height: 1.5; }

#bannedOverlay .reason { color: var(--text-dim); font-size: 0.6rem; margin-top: 0.3rem; }

@keyframes blink { 50% { opacity: 0.2; } }

@media (max-width: 520px) {
  .chat-header .room-tab { font-size: 0.5rem; letter-spacing: 0.5px; padding: 0.25rem 0.3rem; }
  .chat-header .brand-small { font-size: 0.5rem; }
  .chat-header .admin-btn { font-size: 0.5rem; padding: 0.2rem 0.3rem; }
  #adminPanel { width: 100%; }
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div class="scanlines"></div>
<div id="overlay"></div>

<div id="app">

<div id="loginScreen" class="glass">
  <div class="brand">chat<span>JOSE33</span></div>
  <div class="sub" id="loginSub">TERMINAL HACKER CHAT</div>
  <div class="field">
    <label>Nickname</label>
    <input type="text" id="nickInput" placeholder="tu_nick..." maxlength="16" autocomplete="off" />
  </div>
  <div class="field" id="adminPassField" style="display:none;">
    <label>🔑 Clave de admin</label>
    <input type="password" id="adminPass" placeholder="clave..." />
  </div>
  <button class="btn" id="enterBtn">▸ ENTER</button>
  <div class="hint">[ CANAL GLOBAL ]</div>
  <div class="hint" id="adminHint" style="display:none;">[ CANALES: GLOBAL + PRIVADO JOSE ]</div>
</div>

<div id="chatUI" class="glass">
  <div class="chat-header">
    <div class="brand-small">CHATJOSE33</div>
    <div class="room-tabs">
      <button class="room-tab active" data-room="global">🌐 Global <span class="badge" id="globalBadge"></span></button>
      <button class="room-tab" data-room="jose" id="joseTab">🔒 Jose <span class="badge" id="joseBadge"></span></button>
    </div>
    <button class="music-btn" id="musicBtn">🎵</button>
    <button class="admin-btn" id="adminBtn">⚙️ Admin</button>
    <div class="status-badge">
      <span class="dot"></span>
      <span id="statusText">WAIT</span>
    </div>
  </div>

  <div id="musicPanel">
    <button class="music-close" id="musicClose">✕</button>
    <div class="music-input-wrap">
      <input type="text" id="musicInput" placeholder="buscá una canción..." />
      <button class="music-play-btn" id="musicPlayBtn">🔍 BUSCAR</button>
    </div>
    <div class="music-loading" id="musicLoading">Buscando...</div>
    <div class="music-results" id="musicResults"></div>
    <div class="music-info">🎵 <span class="song-title" id="musicNow">Sin reproducción</span></div>
  </div>

  <div class="floating-player" id="floatingPlayer">
    <div class="fp-bar">
      <span class="fp-title" id="fpTitle">Sin música</span>
      <button class="fp-close" id="fpClose">✕</button>
    </div>
    <div id="fpEmbed"></div>
  </div>

  <div class="msgs-wrap">
    <div class="msgs" id="msgContainer"></div>

    <div id="adminPanel">
      <div class="panel-header">
        <h3>⚙️ Panel Admin</h3>
        <button class="close-btn" id="closeAdmin">✕</button>
      </div>
      <div class="panel-body" id="adminBody">
        <div class="empty-state" style="min-height:auto;padding:1rem 0;"><p>Usuarios conectados aparecerán aquí.</p></div>
      </div>
    </div>

    <div class="banned-overlay" id="bannedOverlay">

<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
const cols = Math.floor(canvas.width / 14);
const drops = Array(cols).fill(1);
const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>/{}[]|~!@#$%^&*()_+-=жзийклмнопрстуфхцчшщэюя';
function drawMatrix() {
  ctx.fillStyle = 'rgba(10,10,10,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = Math.random() > 0.97 ? '#ffffff' : '#00ff41';
    ctx.font = '12px monospace';
    ctx.fillText(text, i * 14, drops[i] * 14);
    if (drops[i] * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 45);

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function time() { return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }

// Avatar generator: deterministic color + initials
function getAvatar(nick) {
  let hash = 0;
  for (let i = 0; i < nick.length; i++) { hash = nick.charCodeAt(i) + ((hash << 5) - hash); }
  const h = Math.abs(hash) % 360;
  const bg = 'hsl(' + h + ', 60%, 25%)';
  const initials = nick.substring(0, 2).toUpperCase();
  return { bg, initials };
}

function renderMsgs() {
  const msgs = currentRoom === 'global' ? globalMsgs : joseMsgs;
  msgContainer.innerHTML = '';
  if (msgs.length === 0) {
    const e = document.createElement('div');
    e.className = 'empty-state';
    e.innerHTML = '<div class="icon">💬</div><p>' +
      (currentRoom === 'global' ? 'Sala Global — mensajes públicos.' : '🔒 Canal privado con Jose.') + '</p>';
    msgContainer.appendChild(e);
    return;
  }
  msgs.forEach(m => {
    if (m.system) {
      const div = document.createElement('div');
      div.className = 'msg system';
      div.textContent = m.text;
      msgContainer.appendChild(div);
      return;
    }
    const div = document.createElement('div');
    div.className = 'msg ' + (m.user === myNick ? 'mine' : 'other');
    const av = getAvatar(m.user);
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.style.background = av.bg;
    avatar.style.color = '#fff';
    avatar.textContent = av.initials;
    div.appendChild(avatar);
    const body = document.createElement('div');
    body.className = 'body';
    if (m.priv) {
      const tag = document.createElement('div');
      tag.className = 'tag-priv'; tag.textContent = '🔒 PRIVADO';
      body.appendChild(tag);
    }
    const author = document.createElement('div');
    author.className = 'author';
    author.textContent = '>' + esc(m.user) + (m.user === myNick ? ' (vos)' : '');
    body.appendChild(author);
    const txt = document.createElement('div');
    txt.className = 'text';
    if (m.sticker) {
      txt.className = 'sticker-content';
      txt.textContent = m.sticker;
      if (m.sticker.length > 2) { txt.style.fontSize = '1.8rem'; txt.style.fontWeight = '700'; txt.style.letterSpacing = '2px'; }
      body.appendChild(txt);
      const lbl = document.createElement('div');
      lbl.className = 'sticker-label';
      lbl.textContent = '/' + m.sticker;
      body.appendChild(lbl);
    } else {
      // YouTube link detection
      const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/g;
      let lastIdx = 0, parts = [];
      let match;
      while ((match = ytRegex.exec(m.text)) !== null) {
        if (match.index > lastIdx) parts.push(document.createTextNode(m.text.slice(lastIdx, match.index)));
        const vid = match[1];
        const wrap = document.createElement('div');
        wrap.className = 'youtube-embed';
        wrap.innerHTML = '<iframe src="https://www.youtube.com/embed/' + vid + '?autoplay=0&rel=0" allowfullscreen></iframe>';
        parts.push(wrap);
        lastIdx = match.index + match[0].length;
      }
      if (lastIdx === 0) {
        txt.textContent = m.text;
        body.appendChild(txt);
      } else {
        if (lastIdx < m.text.length) parts.push(document.createTextNode(m.text.slice(lastIdx)));
        parts.forEach(p => { if (typeof p === 'string' || p instanceof Text) txt.appendChild(p); else body.appendChild(p); });
        if (txt.childNodes.length > 0) body.appendChild(txt);
      }
    }
    const t = document.createElement('div');
    t.className = 'time';
    t.textContent = m.time;
    body.appendChild(t);
    div.appendChild(body);
    msgContainer.appendChild(div);
  });
  msgContainer.scrollTo({ top: msgContainer.scrollHeight, behavior: 'smooth' });
}

// Persistencia localStorage
function saveMessages() {
  try {
    localStorage.setItem(STORAGE_KEY_G, JSON.stringify(globalMsgs.slice(-200)));
    localStorage.setItem(STORAGE_KEY_J, JSON.stringify(joseMsgs.slice(-200)));
  } catch {}
}
function loadMessages() {
  try {
    const g = localStorage.getItem(STORAGE_KEY_G);
    if (g) globalMsgs = JSON.parse(g);
    const j = localStorage.getItem(STORAGE_KEY_J);
    if (j) joseMsgs = JSON.parse(j);
  } catch {}
}

function handleMsg(p) {
  if (p.type === 'message') {
    const isPriv = p._topic === CH_JOSE;
    const msg = { user: p.user, text: p.text, time: p.time || time(), priv: isPriv };
    if (isPriv) {
      joseMsgs.push(msg);
      if (currentRoom !== 'jose') { joseUnread++; joseBadge.textContent = joseUnread; joseBadge.classList.add('show'); }
    } else {
      globalMsgs.push(msg);
      if (currentRoom !== 'global') { globalUnread++; globalBadge.textContent = globalUnread; globalBadge.classList.add('show'); }
    }
    if ((isPriv && currentRoom === 'jose') || (!isPriv && currentRoom === 'global')) renderMsgs();
    saveMessages();
  } else if (p.type === 'join' && p.user !== myNick) {
    const sys = { user: '', text: '▸ ' + p.user + ' se conectó', time: time(), system: true, priv: false };
    globalMsgs.push(sys);
    connectedUsers[p.user] = true;
    if (currentRoom === 'global') renderMsgs();
    saveMessages();
    updateAdminPanel();
  } else if (p.type === 'leave' && p.user !== myNick) {
    const sys = { user: '', text: '▸ ' + p.user + ' se desconectó', time: time(), system: true, priv: false };
    globalMsgs.push(sys);
    delete connectedUsers[p.user];
    if (currentRoom === 'global') renderMsgs();
    saveMessages();
    updateAdminPanel();
  } else if (p.type === 'ban') {
    if (p.target === myNick) {
      showBanned(p.reason || 'Sin razón');
    }
    if (isAdmin) {
      bannedNicks[p.target] = p.reason || 'Sin razón';
      updateAdminPanel();
    }
  } else if (p.type === 'unban') {
    if (isAdmin) {
      delete bannedNicks[p.target];
      updateAdminPanel();
    }
  } else if (p.type === 'typing' && p.user !== myNick) {
    typingName.textContent = p.user;
    typingIndicator.classList.add('show');
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => typingIndicator.classList.remove('show'), 2000);
  } else if (p.type === 'userlist_sync') {
    if (Array.isArray(p.users)) {
      p.users.forEach(u => { connectedUsers[u] = true; });
      updateAdminPanel();
    }
  }
}

function showBanned(reason) {
  banReason.textContent = 'Razón: ' + reason;
  bannedOverlay.classList.add('show');
}

function connect() {
  if (ws) try { ws.close(); } catch {}
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    connected = true;
    statusText.textContent = 'LIVE';
    ws.send(JSON.stringify({ topic: CH_GLOBAL, event: 'phx_join', payload: { config: { broadcast: { ack: false, self: true } } }, ref: '1' }));
    ws.send(JSON.stringify({ topic: CH_JOSE, event: 'phx_join', payload: { config: { broadcast: { ack: false, self: true } } }, ref: '2' }));
    ws.send(JSON.stringify({ topic: CH_GLOBAL, event: 'broadcast', payload: { event: 'message', payload: { type: 'join', user: myNick } }, ref: '3' }));
    setTimeout(() => {
      broadcast(CH_GLOBAL, 'userlist_sync', { users: Object.keys(connectedUsers) });
    }, 500);
  };
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.event === 'broadcast' && d.payload?.payload) {
        const p = d.payload.payload;
        p._topic = d.topic;
        handleMsg(p);
      }
    } catch {}
  };
  ws.onclose = () => {
    connected = false;
    statusText.textContent = 'OFF';
    setTimeout(() => connect(), 3000);
  };
  ws.onerror = () => {};
}

function broadcast(topic, type, extra) {
  if (!ws || !connected) return;
  const p = Object.assign({ type, user: myNick, time: time() }, extra);
  ws.send(JSON.stringify({ topic, event: 'broadcast', payload: { event: 'message', payload: p }, ref: Date.now().toString() }));
}

function sendMsg(text, priv) {
  if (!ws || !connected) return;
  const ch = priv ? CH_JOSE : CH_GLOBAL;
  broadcast(ch, 'message', { text, priv });
  const msg = { user: myNick, text, time: time(), priv };
  if (priv) { joseMsgs.push(msg); if (currentRoom === 'jose') renderMsgs(); }
  else { globalMsgs.push(msg); if (currentRoom === 'global') renderMsgs(); }
  saveMessages();
}

async function searchMusic() {
  const q = musicInput.value.trim();
  if (!q || q.length < 2) return;
  musicLoading.classList.add('show');
  musicResults.innerHTML = '';
  musicResults.classList.remove('show');
  try {
    const r = await fetch('https://inv.nadeko.net/api/v1/search?q=' + encodeURIComponent(q));
    const d = await r.json();
    musicLoading.classList.remove('show');
    const vids = d.filter(v => v.type === 'video' && v.videoId).slice(0, 6);
    if (vids.length === 0) { musicResults.innerHTML = '<div style="font-size:0.55rem;color:var(--text-muted);padding:0.3rem;">Sin resultados</div>'; musicResults.classList.add('show'); return; }

        '<span class="mr-dur">' + (v.lengthSeconds ? Math.floor(v.lengthSeconds/60) + ':' + String(v.lengthSeconds%60).padStart(2,'0') : '') + '</span>';
      item.addEventListener('click', () => playVideo(v.videoId, v.title || 'Canción'));

    musicLoading.classList.remove('show');
    musicResults.innerHTML = '<div style="font-size:0.55rem;color:var(--red);padding:0.3rem;">Error de búsqueda</div>';

function updateAdminPanel() {
  if (!adminPanel.classList.contains('show')) return;
  const users = Object.keys(connectedUsers);
  const bans = Object.keys(bannedNicks);
  if (users.length === 0 && bans.length === 0) {
    adminBody.innerHTML = '<div class="empty-state" style="min-height:auto;padding:1rem 0;"><p>Usuarios conectados aparecerán aquí.</p></div>';
    return;
  }
  let html = '';
  html += '<div style="font-size:0.55rem;color:var(--text-muted);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:1px;">🟢 Conectados (' + users.length + ')</div>';
  users.forEach(u => {
    const av = getAvatar(u);
    html += '<div class="user-item"><div class="u-name"><div class="avatar" style="background:' + av.bg + ';color:#fff;">' + av.initials + '</div>' + esc(u) + (u === myNick ? ' <span class="tag">(vos)</span>' : '') + '</div>' +
      (isAdmin && u !== myNick ? '<button class="ban-btn" data-nick="' + esc(u) + '">BAN</button>' : '') +
    '</div>';
  });
  if (bans.length > 0) {
    html += '<div class="ban-list-title">🚫 Baneados (' + bans.length + ')</div>';
    bans.forEach(u => {
      html += '<div class="ban-item"><span>' + esc(u) + (bannedNicks[u] !== 'Sin razón' ? ' — ' + esc(bannedNicks[u]) : '') + '</span>' +
        (isAdmin ? '<button class="unban-btn" data-nick="' + esc(u) + '">UNBAN</button>' : '') +
      '</div>';
    });
  }
  adminBody.innerHTML = html;
  adminBody.querySelectorAll('.ban-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.nick;
      const reason = prompt('Razón del ban (opcional):') || 'Sin razón';
      broadcast(CH_GLOBAL, 'ban', { target, reason });
      bannedNicks[target] = reason;
      // Kick local
      delete connectedUsers[target];
      updateAdminPanel();
    });
  });
  adminBody.querySelectorAll('.unban-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.nick;
      broadcast(CH_GLOBAL, 'unban', { target });
      delete bannedNicks[target];
      updateAdminPanel();
    });
  });
}

// Leave on unload
window.addEventListener('beforeunload', () => {
  if (ws && connected) {
    broadcast(CH_GLOBAL, 'leave', {});
  }
});

// Mobile: visualViewport fix for keyboard
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const diff = window.innerHeight - window.visualViewport.height;
    if (diff > 100) {
      chatUI.style.height = window.visualViewport.height + 'px';
    } else {
      chatUI.style.height = '100dvh';
    }
  });
}

// Cargar baneados del localStorage
try {
  const savedBans = localStorage.getItem('chat_jose33_bans');
  if (savedBans) bannedNicks = JSON.parse(savedBans);
} catch {}

// Guardar baneados periodicamente
setInterval(() => {
  try { localStorage.setItem('chat_jose33_bans', JSON.stringify(bannedNicks)); } catch {}
}, 5000);

// Auto-login si ?admin=1
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('admin') === '1') {
    loginSub.textContent = 'ADMIN PANEL v3.0';
    adminHint.style.display = 'block';
    document.querySelectorAll('.hint')[0].style.display = 'none';
    adminPassField.style.display = 'block';
    nickInput.value = 'jose';
    adminPass.value = 'jose33admin';
    setTimeout(() => enterBtn.click(), 200);
  }
})();
</script>
</body>
</html>
