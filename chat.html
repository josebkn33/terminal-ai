<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="cache-control" content="max-age=0" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="pragma" content="no-cache" />
<title>chatJOSE33 — Terminal Hacker Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a;
  --surface: #0d0d0d;
  --surface-2: #111111;
  --surface-3: #1a1a1a;
  --border: #1f1f1f;
  --text: #00ff41;
  --text-dim: #008f28;
  --text-muted: #005a18;
  --accent: #00ff41;
  --red: #ff0044;
  --yellow: #ffdd00;
  --radius: 4px;
  --font: 'JetBrains Mono', monospace;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
canvas#matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.2; }
.scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,0.015) 2px,rgba(0,255,65,0.015) 4px); }

#app { position: relative; z-index: 2; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 0.75rem; }
.glass { background: rgba(0,0,0,0.88); border: 1px solid var(--text-dim); box-shadow: 0 0 30px rgba(0,255,65,0.08), inset 0 0 30px rgba(0,255,65,0.02); backdrop-filter: blur(4px); }

#loginScreen { width: 100%; max-width: 380px; border-radius: var(--radius); padding: 2.5rem 2rem; text-align: center; }
#loginScreen .brand { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.25rem; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 20px rgba(0,255,65,0.5); }
#loginScreen .brand span { color: var(--text-dim); }
#loginScreen .sub { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 1.5rem; letter-spacing: 2px; }
#loginScreen .field { margin-bottom: 0.75rem; text-align: left; }
#loginScreen .field label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 0.3rem; }
#loginScreen .field input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.7rem 0.9rem; font-family: var(--font); font-size: 0.85rem; color: var(--text); outline: none; transition: all 0.2s; }
#loginScreen .field input:focus { border-color: var(--text); box-shadow: 0 0 15px rgba(0,255,65,0.15); }
#loginScreen .btn { width: 100%; padding: 0.7rem; border: 1px solid var(--text); border-radius: var(--radius); background: transparent; color: var(--text); font-family: var(--font); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: all 0.3s; margin-top: 0.5rem; }
#loginScreen .btn:hover { background: var(--text); color: #000; box-shadow: 0 0 30px rgba(0,255,65,0.3); }
#loginScreen .hint { font-size: 0.65rem; color: var(--text-muted); margin-top: 1rem; letter-spacing: 1px; }

#chatUI { width: 100%; max-width: 520px; height: 100vh; max-height: 840px; border-radius: var(--radius); display: none; flex-direction: column; overflow: hidden; }

.chat-header { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.7rem; flex-shrink: 0; }
.chat-header .brand-small { font-weight: 600; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); flex-shrink: 0; }
.chat-header .room-tabs { display: flex; gap: 2px; background: var(--surface-2); border-radius: var(--radius); padding: 2px; flex: 1; position: relative; }
.chat-header .room-tab { flex: 1; padding: 0.35rem 0.5rem; border: none; border-radius: 3px; background: transparent; color: var(--text-muted); font-family: var(--font); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; white-space: nowrap; position: relative; }
.chat-header .room-tab.active { background: var(--text); color: #000; font-weight: 600; }
.chat-header .room-tab:hover:not(.active) { color: var(--text); }
.chat-header .room-tab .badge { position: absolute; top: -4px; right: -4px; background: var(--red); color: #000; font-size: 0.5rem; font-weight: 700; padding: 0.1rem 0.3rem; border-radius: 10px; display: none; min-width: 14px; text-align: center; }
.chat-header .room-tab .badge.show { display: block; }
.chat-header .status-badge { font-size: 0.55rem; color: var(--text-dim); letter-spacing: 1px; display: flex; align-items: center; gap: 0.3rem; flex-shrink: 0; }
.chat-header .status-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text); display: inline-block; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.2; } }

.msgs { flex: 1; overflow-y: auto; padding: 0.75rem 1rem; display: flex; flex-direction: column; gap: 0.3rem; scroll-behavior: smooth; }
.msgs::-webkit-scrollbar { width: 3px; }
.msgs::-webkit-scrollbar-track { background: transparent; }
.msgs::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 10px; }

.msg { max-width: 92%; padding: 0.45rem 0.7rem; border: 1px solid transparent; font-size: 0.75rem; line-height: 1.5; animation: fadeIn 0.15s ease; position: relative; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.msg.mine { align-self: flex-end; background: rgba(0,255,65,0.06); border-color: rgba(0,255,65,0.15); border-radius: 3px 0 3px 3px; }
.msg.other { align-self: flex-start; background: rgba(255,255,255,0.02); border-color: var(--border); border-radius: 0 3px 3px 3px; }
.msg.system { align-self: center; background: transparent; border: none; font-size: 0.6rem; color: var(--text-muted); max-width: 100%; text-align: center; padding: 0.2rem 0; }
.msg .author { font-size: 0.6rem; font-weight: 600; color: var(--accent); margin-bottom: 0.05rem; letter-spacing: 0.5px; }
.msg.mine .author { color: var(--text-dim); }
.msg .text { word-wrap: break-word; }
.msg .time { font-size: 0.5rem; color: var(--text-muted); margin-top: 0.1rem; text-align: right; opacity: 0.6; }
.msg.mine .time { color: var(--text-dim); }
.msg .tag-priv { display: inline-block; font-size: 0.5rem; background: rgba(255,0,68,0.2); color: var(--red); padding: 0.05rem 0.3rem; border-radius: 2px; margin-bottom: 0.1rem; letter-spacing: 1px; }

.msgs .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); text-align: center; min-height: 200px; }
.msgs .empty-state .icon { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.3; }
.msgs .empty-state p { font-size: 0.65rem; max-width: 200px; line-height: 1.6; }

.typing-indicator { align-self: flex-start; display: none; font-size: 0.6rem; color: var(--text-dim); padding: 0.2rem 0; letter-spacing: 0.5px; }
.typing-indicator.show { display: block; }

.input-wrap { padding: 0.5rem 1rem 0.7rem; border-top: 1px solid var(--border); display: flex; gap: 0.4rem; flex-shrink: 0; align-items: flex-end; }
.input-wrap .emoji-btn { background: none; border: none; color: var(--text-muted); font-size: 1rem; cursor: pointer; padding: 0.3rem; transition: color 0.2s; line-height: 1; }
.input-wrap .emoji-btn:hover { color: var(--text); }
.input-wrap input { flex: 1; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.55rem 0.8rem; font-family: var(--font); font-size: 0.75rem; color: var(--text); outline: none; transition: border-color 0.2s; }
.input-wrap input::placeholder { color: var(--text-muted); }
.input-wrap input:focus { border-color: var(--text-dim); }
.input-wrap .send-btn { width: 34px; height: 34px; border-radius: var(--radius); border: 1px solid var(--text-dim); background: transparent; color: var(--text); font-size: 0.8rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.input-wrap .send-btn:hover { background: var(--text); color: #000; }

.emoji-picker { display: none; padding: 0.5rem 1rem; border-top: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; gap: 0.3rem; max-height: 120px; overflow-y: auto; }
.emoji-picker.show { display: flex; }
.emoji-picker button { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 0.2rem; border-radius: 3px; transition: background 0.15s; line-height: 1; }
.emoji-picker button:hover { background: var(--surface-3); }

@media (max-width: 520px) {
  #app { padding: 0; }
  #loginScreen, #chatUI { border-radius: 0; border: none; max-height: 100vh; }
  .chat-header .room-tab { font-size: 0.55rem; letter-spacing: 0.5px; }
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div class="scanlines"></div>

<div id="app">

<div id="loginScreen" class="glass">
  <div class="brand">chat<span>JOSE33</span></div>
  <div class="sub">TERMINAL HACKER CHAT v2.0</div>
  <div class="field">
    <label>Nickname</label>
    <input type="text" id="nickInput" placeholder="tu_nick..." maxlength="16" autocomplete="off" />
  </div>
  <div class="field" id="adminPassField" style="display:none;">
    <label>🔑 Clave de admin</label>
    <input type="password" id="adminPass" placeholder="clave..." />
  </div>
  <button class="btn" id="enterBtn">▸ ENTER</button>
  <div class="hint">[ CANALES: GLOBAL + PRIVADO ]</div>
</div>

<div id="chatUI" class="glass">
  <div class="chat-header">
    <div class="brand-small">CHATJOSE33</div>
    <div class="room-tabs">
      <button class="room-tab active" data-room="global">🌐 Global <span class="badge" id="globalBadge"></span></button>
      <button class="room-tab" data-room="jose">🔒 Jose <span class="badge" id="joseBadge"></span></button>
    </div>
    <div class="status-badge">
      <span class="dot"></span>
      <span id="statusText">LIVE</span>
    </div>
  </div>

  <div class="msgs" id="msgContainer"></div>
  <div class="typing-indicator" id="typingIndicator">▸ <span id="typingName"></span> está escribiendo...</div>

  <div class="emoji-picker" id="emojiPicker">
    <button>😀</button><button>😂</button><button>🤣</button><button>😅</button><button>😊</button><button>😎</button><button>🤩</button><button>😍</button><button>🥰</button><button>😜</button><button>🤪</button><button>😈</button><button>🔥</button><button>💀</button><button>☠️</button><button>👽</button><button>🤖</button><button>💪</button><button>👍</button><button>💯</button><button>✅</button><button>⚡</button><button>🔒</button><button>🛡️</button><button>🐍</button><button>⚔️</button><button>🎯</button>
  </div>

  <form class="input-wrap" id="form">
    <button type="button" class="emoji-btn" id="emojiToggle">😀</button>
    <input type="text" id="msgInput" placeholder="escribí un mensaje..." autocomplete="off" />
    <button type="submit" class="send-btn">⏎</button>
  </form>
</div>

</div>

<script>
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const cols = Math.floor(canvas.width / 14);
const drops = Array(cols).fill(1);
const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>/{}[]|~!@#$%^&*()_+-=жзийклмнопрстуфхцчшщэюя';
function drawMatrix() {
  ctx.fillStyle = 'rgba(10,10,10,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = Math.random() > 0.97 ? '#ffffff' : '#00ff41';
    ctx.fillText(text, i * 14, drops[i] * 14);
    if (drops[i] * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 45);

const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBreGNmYW9rb2hpdmNyamVhemluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNTAxODEsImV4cCI6MjA5ODYyNjE4MX0.aZJ-aeZeaikMig24E2ax-L48EHwM-LJwonf5bkooIH8';
const WS_URL = 'wss://pkxcfaokohivcrjeazin.supabase.co/realtime/v1/websocket?apikey=' + ANON_KEY + '&vsn=1.0.0';
const CH_GLOBAL = 'realtime:chat-jose33-global';
const CH_JOSE = 'realtime:chat-jose33-dm-v2'; // cambia cada deploy

let ws, myNick = '', currentRoom = 'global', connected = false, isAdmin = false;
let globalMsgs = [], joseMsgs = [];
let typingTimer, globalUnread = 0, joseUnread = 0;

const l = id => document.getElementById(id);
const loginScreen = l('loginScreen'), chatUI = l('chatUI');
const nickInput = l('nickInput'), enterBtn = l('enterBtn');
const msgInput = l('msgInput'), msgContainer = l('msgContainer');
const form = l('form'), statusText = l('statusText');
const emojiPicker = l('emojiPicker'), emojiToggle = l('emojiToggle');
const typingIndicator = l('typingIndicator'), typingName = l('typingName');
const joseBadge = l('joseBadge'), globalBadge = l('globalBadge');
const adminPassField = l('adminPassField'), adminPass = l('adminPass');

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function time() { return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }

function renderMsgs() {
  const msgs = currentRoom === 'global' ? globalMsgs : joseMsgs;
  msgContainer.innerHTML = '';
  if (msgs.length === 0) {
    const e = document.createElement('div');
    e.className = 'empty-state';
    e.innerHTML = '<div class="icon">💬</div><p>' +
      (currentRoom === 'global' ? 'Sala Global — todos ven esto.' : '🔒 Canal privado con Jose.') + '</p>';
    msgContainer.appendChild(e);
    return;
  }
  msgs.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.user === myNick ? 'mine' : 'other');
    if (m.priv) {
      const tag = document.createElement('div');
      tag.className = 'tag-priv'; tag.textContent = '🔒 PRIVADO';
      div.appendChild(tag);
    }
    const author = document.createElement('div');
    author.className = 'author'; author.textContent = '>' + m.user;
    div.appendChild(author);
    const txt = document.createElement('div');
    txt.className = 'text'; txt.textContent = m.text;
    div.appendChild(txt);
    const t = document.createElement('div');
    t.className = 'time'; t.textContent = m.time;
    div.appendChild(t);
    msgContainer.appendChild(div);
  });
  msgContainer.scrollTo({ top: msgContainer.scrollHeight, behavior: 'smooth' });
}

function handleMsg(p) {
  if (p.type === 'message') {
    const isPriv = p._topic === CH_JOSE;
    const msg = { user: p.user, text: p.text, time: p.time || time(), priv: isPriv };
    if (isPriv) {
      joseMsgs.push(msg);
      if (currentRoom !== 'jose') { joseUnread++; joseBadge.textContent = joseUnread; joseBadge.classList.add('show'); }
    } else {
      globalMsgs.push(msg);
      if (currentRoom !== 'global') { globalUnread++; globalBadge.textContent = globalUnread; globalBadge.classList.add('show'); }
    }
    if ((isPriv && currentRoom === 'jose') || (!isPriv && currentRoom === 'global')) renderMsgs();
  } else if (p.type === 'join' && p.user !== myNick) {
    const sys = { user: '', text: '▸ ' + p.user + ' se conectó', time: time(), priv: false };
    globalMsgs.push(sys);
    if (currentRoom === 'global') renderMsgs();
  } else if (p.type === 'typing' && p.user !== myNick) {
    typingName.textContent = p.user;
    typingIndicator.classList.add('show');
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => typingIndicator.classList.remove('show'), 2000);
  }
}

function connect() {
  if (ws) try { ws.close(); } catch {}
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    connected = true;
    statusText.textContent = 'LIVE';
    ws.send(JSON.stringify({ topic: CH_GLOBAL, event: 'phx_join', payload: { config: { broadcast: { ack: false, self: true } } }, ref: '1' }));
    ws.send(JSON.stringify({ topic: CH_JOSE, event: 'phx_join', payload: { config: { broadcast: { ack: false, self: true } } }, ref: '2' }));
    ws.send(JSON.stringify({ topic: CH_GLOBAL, event: 'broadcast', payload: { event: 'message', payload: { type: 'join', user: myNick } }, ref: '3' }));
  };
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.event === 'broadcast' && d.payload?.payload) {
        const topic = d.topic;
        const p = d.payload.payload;
        p._topic = topic;
        handleMsg(p);
      }
    } catch {}
  };
  ws.onclose = () => { connected = false; statusText.textContent = 'OFF'; setTimeout(() => connect(adminMode), 3000); };
  ws.onerror = () => {};
}

function sendMsg(text, priv) {
  if (!ws || !connected) return;
  const ch = priv ? CH_JOSE : CH_GLOBAL;
  const p = { type: 'message', user: myNick, text, time: time() };
  ws.send(JSON.stringify({ topic: ch, event: 'broadcast', payload: { event: 'message', payload: p }, ref: Date.now().toString() }));
  if (priv) { joseMsgs.push({ ...p, priv: true }); if (currentRoom === 'jose') renderMsgs(); }
  else { globalMsgs.push(p); if (currentRoom === 'global') renderMsgs(); }
}

// ROOM TABS
document.querySelectorAll('.room-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentRoom = tab.dataset.room;
    if (currentRoom === 'jose') { joseUnread = 0; joseBadge.classList.remove('show'); }
    else { globalUnread = 0; globalBadge.classList.remove('show'); }
    renderMsgs();
  });
});

// FORM
form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = msgInput.value.trim();
  if (!text || !connected || !ws) return;
  const priv = currentRoom === 'jose';
  msgInput.value = '';
  sendMsg(text, priv);
  emojiPicker.classList.remove('show');
});

// TYPING
let typingTimeout;
msgInput.addEventListener('input', () => {
  if (!connected || !ws) return;
  clearTimeout(typingTimeout);
  ws.send(JSON.stringify({ topic: CH_GLOBAL, event: 'broadcast', payload: { event: 'message', payload: { type: 'typing', user: myNick } }, ref: Date.now().toString() }));
  typingTimeout = setTimeout(() => {}, 1000);
});

emojiToggle.addEventListener('click', () => emojiPicker.classList.toggle('show'));
emojiPicker.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => { msgInput.value += btn.textContent; msgInput.focus(); });
});

// Detectar si el nick es "jose" o "admin" para pedir clave
nickInput.addEventListener('input', () => {
  const n = nickInput.value.trim().toLowerCase();
  adminPassField.style.display = (n === 'jose' || n === 'admin') ? 'block' : 'none';
});

enterBtn.addEventListener('click', () => {
  const nick = nickInput.value.trim();
  if (!nick || nick.length < 2) { nickInput.focus(); return; }
  const lower = nick.toLowerCase();
  let adminMode = false;
  if (lower === 'jose' || lower === 'admin') {
    const pass = adminPass.value.trim();
    if (pass !== 'jose33admin') { alert('🔒 Clave incorrecta para modo admin'); return; }
    adminMode = true;
  }
  myNick = nick;
  isAdmin = adminMode;
  loginScreen.style.display = 'none';
  chatUI.style.display = 'flex';
  addSysMsg('▸ Bienvenido a chatJOSE33, ' + nick + (adminMode ? ' [ADMIN]' : ''));
  connect();
});
nickInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') enterBtn.click(); });

function addSysMsg(text) {
  globalMsgs.push({ user: '', text, time: time(), priv: false });
  if (currentRoom === 'global') renderMsgs();
}

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
